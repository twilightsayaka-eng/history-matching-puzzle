<html lang="ja">

  <meta name="apple-mobile-web-app-capable" content="yes">

    :root {
      --bg1: #fff5f5;
      --bg2: #fffafc;
      --card: #ffffff;
      --main: #d63384;
      --sub: #666;
      --accent: #ff85a1;
      --accent2: #fd7e14;
      --line: #ffd6e0;
      --soft: #fff0f6;
      --ok: #2b8a3e;
      --ok-bg: #ebfbee;
      --ok-line: #8ce99a;
      --ng: #e03131;
      --ng-bg: #fff5f5;
      --ng-line: #ffa8a8;
      --gold: #f59f00;
      --gold-bg: #fff9db;
      --gold-line: #ffe066;
      --shadow: 0 12px 28px rgba(0,0,0,.08);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: #333;
    }

    body {
      text-align: center;
      padding: calc(14px + var(--safe-top)) 12px calc(18px + var(--safe-bottom));
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
    }

    .badge {
      display: inline-block;
      font-size: .72rem;
      color: #c2255c;
      background: #ffe3ec;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    h1 {
      margin: 6px 0 6px;
      color: var(--main);
      font-size: 1.45rem;
      line-height: 1.3;
    }

    .lead {
      margin: 0 auto 14px;
      font-size: .92rem;
      color: var(--sub);
      line-height: 1.7;
      max-width: 760px;
    }

    .panel {
      background: var(--card);
      border: 2px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 14px;
      margin-top: 16px;
    }

    .settings {
      display: grid;
      gap: 12px;
      margin-bottom: 14px;
    }

    .setting-block {
      background: #fffafc;
      border: 2px solid #ffe3ec;
      border-radius: 18px;
      padding: 12px;
      text-align: left;
    }

    .setting-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--main);
      margin-bottom: 8px;
    }

    .chip-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border: 2px solid var(--line);
      background: #fff;
      color: var(--main);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .88rem;
      font-weight: 700;
      cursor: pointer;
    }

    .chip.active {
      background: var(--soft);
      border-color: var(--accent);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .mini-chip {
      background: var(--soft);
      color: var(--main);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .76rem;
      font-weight: 700;
    }

    .board {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .column {
      background: #fffafc;
      border: 2px solid #ffe3ec;
      border-radius: 18px;
      padding: 10px;
    }

    .column-title {
      font-size: .95rem;
      font-weight: 700;
      color: var(--main);
      margin-bottom: 8px;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      width: 100%;
      background: #fff;
      border: 2px solid #ffecf2;
      border-radius: 14px;
      padding: 12px 10px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 700;
      line-height: 1.5;
      color: var(--main);
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      cursor: pointer;
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      user-select: none;
      -webkit-user-select: none;
      border: 2px solid #ffecf2;
    }

    .mix-card {
      flex-direction: column;
      align-items: flex-start;
      text-align: left;
      gap: 6px;
      padding: 12px;
    }

    .mix-person {
      font-size: .95rem;
      color: #7a284f;
      font-weight: 800;
    }

    .mix-event {
      font-size: .86rem;
      color: #555;
      line-height: 1.6;
      font-weight: 700;
    }

    .card:active {
      transform: scale(.98);
    }

    .card.selected {
      background: #fff0f6;
      border-color: var(--accent);
      transform: scale(1.01);
    }

    .card.locked {
      cursor: default;
      opacity: .96;
    }

    .card.correct {
      background: var(--ok-bg);
      border-color: var(--ok-line);
      color: var(--ok);
    }

    .card.correct .mix-person,
    .card.correct .mix-event {
      color: var(--ok);
    }

    .card.wrong {
      background: var(--ng-bg);
      border-color: var(--ng-line);
      color: var(--ng);
    }

    .card.wrong .mix-person,
    .card.wrong .mix-event {
      color: var(--ng);
    }

    .log {
      margin-top: 14px;
      background: #fffafc;
      border: 2px dashed #ffd6e0;
      border-radius: 16px;
      padding: 12px;
      text-align: left;
    }

    .log-title {
      font-size: .9rem;
      font-weight: 700;
      color: var(--main);
      margin-bottom: 8px;
      text-align: center;
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: .9rem;
      line-height: 1.5;
      max-height: 220px;
      overflow: auto;

    .log-ok {
      color: var(--ok);
      font-weight: 700;
    }

    .log-ng {
      color: var(--ng);
      font-weight: 700;
    }

    .buttons {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
    }

    .main-btn {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      padding: 14px 20px;
      width: min(100%, 320px);
      cursor: pointer;
    }

    .check-btn {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 6px 18px rgba(253,126,20,.22);
    }

    .reset-btn {
      background: var(--soft);
      color: var(--main);
      border: 2px solid var(--line);
    }

    .next-btn {
      color: #6b4f00;
      background: linear-gradient(135deg, #ffe066, #ffd43b);
      box-shadow: 0 6px 18px rgba(245,159,0,.22);
    }

    #result {
      margin-top: 15px;
      min-height: 3.2em;
      font-weight: 700;
      font-size: 1.02rem;
      line-height: 1.65;
      padding: 4px 6px;
    }

    .ok-text { color: var(--ok); }
    .ng-text { color: var(--ng); }

    .reward {
      margin-top: 14px;
      background: var(--gold-bg);
      border: 2px solid var(--gold-line);
      border-radius: 18px;
      padding: 14px;
      color: #7a5b00;
      font-weight: 700;
      line-height: 1.7;
      display: none;
    }

    .reward.show {
      display: block;
    }

    .note {
      margin-top: 12px;
      font-size: .76rem;
      color: #777;
      line-height: 1.6;
    }

    @media (max-width: 700px) {
      .board {
        grid-template-columns: 1fr;
      }
      h1 {
        font-size: 1.34rem;
      }
      .mix-person {
        font-size: .92rem;
      }
      .mix-event {
        font-size: .82rem;
      }
    }
  </style>
</head>

    }

    function resetLog() {
      logList.innerHTML = "<div>まだ組み合わせていません。</div>";
    }

    function addLog(text, isCorrect) {
      if (logList.textContent.includes("まだ組み合わせていません。")) {
        logList.innerHTML = "";
      }
      const div = document.createElement("div");
      div.className = isCorrect ? "log-ok" : "log-ng";
      div.textContent = text;
      logList.prepend(div);
    }

    function buildChips() {
      stageChips.innerHTML = "";
      levelChips.innerHTML = "";

      stageOptions.forEach(option => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip" + (option.key === currentStage ? " active" : "");
        btn.textContent = option.label;
        btn.addEventListener("click", () => {
          currentStage = option.key;
          refreshPuzzle();
        });
        stageChips.appendChild(btn);
      });

      levelOptions.forEach(option => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip" + (option.key === currentLevel ? " active" : "");
        btn.textContent = option.label;
        btn.addEventListener("click", () => {
          currentLevel = option.key;
          refreshPuzzle();
        });
        levelChips.appendChild(btn);
      });
    }

    function getCurrentPairs() {
      return puzzleData[currentStage][currentLevel];
    }

    function renderCards() {
      eraList.innerHTML = "";
      mixList.innerHTML = "";

      const shuffledEras = shuffleArray(currentPairs);
      const shuffledMix = shuffleArray(currentPairs);

      shuffledEras.forEach(item => {
        const card = document.createElement("button");
        card.className = "card era-card";
        card.textContent = item.era;
        card.dataset.era = item.era;
        card.type = "button";
        card.addEventListener("click", () => selectEra(card));
        eraList.appendChild(card);
      });

      shuffledMix.forEach(item => {
        const card = document.createElement("button");
        card.className = "card mix-card";
        card.dataset.person = item.person;
        card.dataset.event = item.event;
        card.dataset.era = item.era;
        card.type = "button";
        card.innerHTML = `
          <div class="mix-person">${item.person}</div>
          <div class="mix-event">${item.event}</div>
        `;
        card.addEventListener("click", () => selectMix(card));
        mixList.appendChild(card);
      });
    }

    function selectEra(card) {
      if (card.classList.contains("locked")) return;
      document.querySelectorAll(".era-card").forEach(c => c.classList.remove("selected"));
      card.classList.add("selected");
      selectedEraCard = card;
      updateStatus("次に右のカードを選んでください");
    }

    function selectMix(card) {
      if (!selectedEraCard) {
        updateStatus("先に左の時代を選んでください");
        return;
      }
      if (card.classList.contains("locked")) return;

      card.classList.add("selected");

      const selectedEra = selectedEraCard.dataset.era;
      const cardEra = card.dataset.era;
      const person = card.dataset.person;
      const event = card.dataset.event;

      if (selectedEra === cardEra) {
        selectedEraCard.classList.remove("selected");
        card.classList.remove("selected");

        selectedEraCard.classList.add("correct", "locked");
        card.classList.add("correct", "locked");

        selectedEraCard.disabled = true;
        card.disabled = true;

        matchedCount++;
        addLog("○ " + selectedEra + " － " + person + "（" + event + "）", true);
        updateStatus("正解 " + matchedCount + " / " + currentPairs.length);
      } else {
        selectedEraCard.classList.remove("selected");
        card.classList.remove("selected");

        selectedEraCard.classList.add("wrong");
        card.classList.add("wrong");

        const eraRef = selectedEraCard;
        const mixRef = card;

        setTimeout(() => {
          eraRef.classList.remove("wrong");
          mixRef.classList.remove("wrong");
        }, 800);

        addLog("× " + selectedEra + " － " + person + "（" + event + "）", false);
        updateStatus("ちがいます。もう一回！");
      }

      selectedEraCard = null;
    }

    function checkFinalResult() {
      if (matchedCount === currentPairs.length) {
        resultEl.innerHTML = "🎉 すごい！全部の組み合わせが正解です！<br>人物・出来事・時代がしっかりつながっています。";
        resultEl.className = "ok-text";
        updateStatus("全問クリア！");
        nextButton.style.display = "block";
        showReward();
      } else {
        resultEl.innerHTML = "今の正解数は " + matchedCount + " / " + currentPairs.length + " です。<br>緑になっていないところを見直してみましょう。";
        resultEl.className = "ng-text";
        updateStatus(matchedCount + "組正解");
        nextButton.style.display = "none";
        rewardBox.classList.remove("show");
      }
    }

    function showReward() {
      const isLastStage = currentStage === "all" && currentLevel === "advanced";
      if (isLastStage) {
        rewardBox.innerHTML = "🏆 おめでとうございます！<br>総合パズルの全ステージをクリアしました。<br>もう立派な歴史マスターです。";
      } else {
        rewardBox.innerHTML = "🌟 ステージクリア！<br>この調子で次のステージにも挑戦してみましょう。";
      }
      rewardBox.classList.add("show");
    }

    function goToNextStage() {
      const currentLevelIndex = levelOptions.findIndex(item => item.key === currentLevel);
      const currentStageIndex = stageOptions.findIndex(item => item.key === currentStage);

      if (currentLevelIndex < levelOptions.length - 1) {
        currentLevel = levelOptions[currentLevelIndex + 1].key;
      } else if (currentStageIndex < stageOptions.length - 1) {
        currentStage = stageOptions[currentStageIndex + 1].key;
        currentLevel = levelOptions[0].key;
      } else {
        rewardBox.innerHTML = "🏆 すべてのステージをクリアしました！<br>最初からもう一回遊ぶこともできます。";
        rewardBox.classList.add("show");
        nextButton.style.display = "none";
        return;
      }

      refreshPuzzle();
    }

    function refreshPuzzle() {
      buildChips();
      resetPuzzle();
    }

    function resetPuzzle() {
      currentPairs = getCurrentPairs();
      matchedCount = 0;
      selectedEraCard = null;
      resultEl.innerHTML = "";
      resultEl.className = "";
      nextButton.style.display = "none";
      rewardBox.classList.remove("show");
      updateStatus("時代を選んでください");
      updateCount();
      resetLog();
      renderCards();
    }

    refreshPuzzle();
  </script>
</body>
</html>
